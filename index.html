function sessionDayKey() {

}

function markSessionDay() {
  try { localStorage.setItem(SESSION_DAY_KEY, sessionDayKey()); } catch {}
}

function clearSessionDay() {
  try { localStorage.removeItem(SESSION_DAY_KEY); } catch {}
}

/** 運用開始まで true（ログイン省略・端末内保存）。本番ログイン必須にするときは false に戻す */
const SKIP_LOGIN = true;
const IS_IOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const IS_STANDALONE = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
const IS_PHONE = /iPhone|iPod|Android.*Mobile/i.test(navigator.userAgent);

function canMasterFullEdit() {
  return !IS_PHONE;
}
let deferredInstallPrompt = null;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  updateInstallUi();
});

function updateInstallUi() {
  const show = !IS_STANDALONE && (deferredInstallPrompt || IS_IOS);
  document.querySelectorAll(".install-btn").forEach(btn => {
    btn.classList.toggle("hidden", !show);
    btn.textContent = IS_IOS && !deferredInstallPrompt ? "ホーム画面に追加" : "アプリをインストール";
  });
}

async function promptInstall() {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    updateInstallUi();
    return;
  }
  toast("ブラウザの共有メニューから「ホーム画面に追加」を選んでください");
}

function bindInstallButtons() {
  document.querySelectorAll(".install-btn").forEach(btn => {
    btn.onclick = () => promptInstall();
  });
  updateInstallUi();
}

function registerServiceWorkerLater() {
  if (!("serviceWorker" in navigator)) return;
  const run = () => navigator.serviceWorker.register("./sw.js").catch(() => {});

}

const ZOOM_KEY = "lg_itemZoom";
const ZOOM_MIN = 0.7;
const ZOOM_MAX = 1.5;
const ZOOM_STEP = 0.1;

function loadItemZoom() {
  const v = parseFloat(localStorage.getItem(ZOOM_KEY));
  return Number.isFinite(v) ? Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, v)) : 1;
}

function updateZoomControls() {
  const label = document.querySelector(".zoom-label");
  if (label) {
    label.textContent = state.fitAllMode
      ? (state.fitCols > 1 ? "全体·2列" : "全体")
      : `${Math.round(state.itemZoom * 100)}%`;
  }
  const out = document.getElementById("btn-zoom-out");
  const inn = document.getElementById("btn-zoom-in");
  if (out) out.disabled = state.fitAllMode || state.itemZoom <= ZOOM_MIN;
  if (inn) inn.disabled = state.fitAllMode || state.itemZoom >= ZOOM_MAX;
  const fitBtn = document.getElementById("btn-fit-all");
  if (fitBtn) {
    fitBtn.classList.toggle("active", state.fitAllMode);
    fitBtn.textContent = state.fitAllMode ? "解除" : "全体表示";
    fitBtn.setAttribute("aria-label", state.fitAllMode ? "全体表示を解除" : "品目を1画面に収めて表示");
  }
}

function setItemZoom(next, { persist = true } = {}) {
  if (state.fitAllMode) return;
  state.itemZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Math.round(next * 100) / 100));
  if (persist) localStorage.setItem(ZOOM_KEY, String(state.itemZoom));
  const panel = document.querySelector(".items-panel");
  if (panel) panel.style.setProperty("--iz", state.itemZoom);
  updateZoomControls();
}

/** 全体表示: 行を画面高さに均等配置。収まらなければ2列へ */
function applyFitAllZoom() {
  const panel = document.querySelector(".items-panel");
  const scrollEl = document.getElementById("items-scroll");
  if (!panel || !scrollEl || !state.items.length) return;

  const n = state.items.length;
  const head = scrollEl.querySelector(".list-head");
  const avail = Math.max(80, scrollEl.clientHeight - (head?.offsetHeight || 22) - 4);
  const MIN_ROW = 34;
  const cols = (n > 8 && avail / n < MIN_ROW) ? 2 : 1;
  const rowCount = Math.ceil(n / cols);
  const rowH = avail / rowCount;

  if (state.fitCols !== cols) {
    state.fitCols = cols;
    render();
    return;
  }

  panel.classList.toggle("fit-cols-2", cols === 2);
  const nameFs = Math.max(12, Math.min(22, rowH * 0.42));
  const qtyFs = Math.max(13, Math.min(24, rowH * 0.5));
  const qtyW = Math.max(48, Math.min(72, rowH * 1.35 + 20));
  panel.style.setProperty("--fit-name-fs", `${Math.round(nameFs * 10) / 10}px`);
  panel.style.setProperty("--fit-qty-fs", `${Math.round(qtyFs * 10) / 10}px`);
  panel.style.setProperty("--fit-qty-w", `${Math.round(qtyW)}px`);
  panel.style.setProperty("--iz", "1");
  updateZoomControls();
}

function enterFitAll() {
  if (!state.items.length) {
    toast("客先を選んでから全体表示してください", "error");
    return;
  }
  if (!state.fitAllMode) state.zoomBeforeFit = state.itemZoom;
  state.fitAllMode = true;
  state.fitCols = 1;
  render();
}

function exitFitAll() {
  if (!state.fitAllMode) return;
  const restore = state.zoomBeforeFit ?? 1;
  state.fitAllMode = false;
  state.fitCols = 1;
  state.zoomBeforeFit = null;
  state.itemZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, restore));
  localStorage.setItem(ZOOM_KEY, String(state.itemZoom));
  render();
}

function toggleFitAll() {
  if (state.fitAllMode) exitFitAll();
  else enterFitAll();
}

function isLandscape() {
  return window.matchMedia("(orientation: landscape)").matches || window.innerWidth > window.innerHeight;
}

function applyDeviceLayout() {
  const w = window.innerWidth || 1;
  const h = window.innerHeight || 1;
  const shortSide = Math.min(w, h);
  const longSide = Math.max(w, h);
  // 基準: 横置きタブレット短辺 800px 前後を 1.0
  let scale = shortSide / 800;
  scale = Math.max(0.82, Math.min(1.15, Math.round(scale * 100) / 100));
  let numpadW = Math.round(Math.min(320, Math.max(220, longSide * 0.22)));
  if (!isLandscape()) numpadW = Math.min(w, 360);
  document.documentElement.style.setProperty("--ui-scale", String(scale));
  document.documentElement.style.setProperty("--numpad-w", `${numpadW}px`);
}

function maybeAutoFitForDevice() {
  if (!isLandscape() || state.tab !== 0 || !state.items.length) return;
  if (!state.fitAllMode) {
    state.zoomBeforeFit = state.itemZoom;
    state.fitAllMode = true;
  }
}

let fitResizeTimer = null;
window.addEventListener("resize", () => {
  applyDeviceLayout();
  if (!state.fitAllMode || state.tab !== 0) return;
  clearTimeout(fitResizeTimer);
  fitResizeTimer = setTimeout(() => applyFitAllZoom(), 150);
});
window.addEventListener("orientationchange", () => {
  applyDeviceLayout();
  setTimeout(() => {
    if (state.fitAllMode && state.tab === 0) applyFitAllZoom();
  }, 250);
});
applyDeviceLayout();

async function loginWithPassword(password) {
  const pass = password.trim();
  if (!pass) throw new Error("パスワードを入力してください");
  const profiles = await getUserProfiles();
  if (!profiles.length) throw new Error("ユーザー情報を取得できません。しばらく待ってから再試行してください。");
  for (const prof of profiles) {
    const email = prof.shortId
      ? prof.shortId.toLowerCase() + "@pv.local"
      : (prof.email || "");
    if (!email) continue;
    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      setUserProfile(prof);
      return cred.user;
    } catch (e) {
      if (e.code === "auth/too-many-requests") {
        throw new Error("ログイン試行が多すぎます。しばらく待ってから再試行してください。");
      }
    }
  }
  throw new Error("パスワードが正しくありません");
}

function todayInput() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso.includes("T") ? iso : iso + "T12:00:00");
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
}

function sortedLedgers() {
  return [...state.ledgers].sort((a, b) => {
    const byDate = (b.deliveryDate || "").localeCompare(a.deliveryDate || "");
    if (byDate !== 0) return byDate;
    return (b.createdAt || "").localeCompare(a.createdAt || "");
  });
}

function historyCutoffDateStr() {
  const d = new Date();
  d.setMonth(d.getMonth() - HISTORY_MONTHS);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function ledgerRetentionDate(record) {
  if (record.deliveryDate) return record.deliveryDate;
  if (record.createdAt) return record.createdAt.slice(0, 10);
  return "";
}

function applyLedgerRetention(ledgers) {
  const cutoff = historyCutoffDateStr();
  return ledgers.filter(l => ledgerRetentionDate(l) >= cutoff);
}

function cacheLedgers() {
  const key = state.demoMode ? "lg_ledgers_demo" : "lg_ledgers";
  try { localStorage.setItem(key, JSON.stringify(state.ledgers)); } catch {}
}

async function pruneOldLedgersFromCloud() {
  if (state.demoMode) return;
  const cutoff = historyCutoffDateStr();
  const q = query(collection(db, "ledgerRecords"), where("deliveryDate", "<", cutoff));
  const snap = await getDocs(q);
  if (snap.empty) return;
  await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
}

function toast(msg, type = "success") {
  const el = document.createElement("div");
  el.className = "toast" + (type === "error" ? " error" : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

async function fsLoad(key) {
  const snap = await getDoc(doc(db, "pvdata", key));
  if (!snap.exists()) return null;
  try { return JSON.parse(snap.data().value); } catch { return null; }
}

async function loadLedgersFromCloud() {
  const cutoff = historyCutoffDateStr();
  try {
    const q = query(
      collection(db, "ledgerRecords"),
      where("deliveryDate", ">=", cutoff),
      orderBy("deliveryDate", "desc"),
      limit(500)
    );
    const snap = await getDocs(q);
    state.ledgers = snap.docs.map(d => d.data());
  } catch (e) {
    console.warn(e);
    const q = query(collection(db, "ledgerRecords"), orderBy("createdAt", "desc"), limit(500));
    const snap = await getDocs(q);
    state.ledgers = applyLedgerRetention(snap.docs.map(d => d.data()));
  }
  cacheLedgers();
  pruneOldLedgersFromCloud().catch(() => {});
}

function cacheLedgerMaster() {

  try {
    localStorage.setItem(custKey, JSON.stringify(state.customers));
    localStorage.setItem(itemsKey, JSON.stringify(state.prices));
  } catch {}
}

function loadLedgerMasterFromCache() {
  const custKey = state.demoMode ? MASTER_CUST_KEY_DEMO : MASTER_CUST_KEY;
  const itemsKey = state.demoMode ? MASTER_ITEMS_KEY_DEMO : MASTER_ITEMS_KEY;
  try {
    const cust = localStorage.getItem(custKey);
    const items = localStorage.getItem(itemsKey);
    if (cust && items) {
      state.customers = JSON.parse(cust);
      state.prices = JSON.parse(items);
      return true;
    }
  } catch {}
  return false;
}

function normalizeMasterItems(rows) {
  return (Array.isArray(rows) ? rows : []).map(p => ({
    customer: p.customer || "",
    code: p.code || "",
    name: p.name || p.code || "（名称なし）"
  })).filter(p => p.customer && p.name);
}

async function importInvoiceMasterIfEmpty() {
  const [pvCust, pvPrices] = await Promise.all([fsLoad("customers"), fsLoad("prices")]);
  let imported = false;
  if (Array.isArray(pvCust) && pvCust.length) {
    state.customers = pvCust.map(c => ({ id: c.id || "", name: c.name || "" })).filter(c => c.name);
    imported = true;
  }
  if (Array.isArray(pvPrices) && pvPrices.length) {
    state.prices = normalizeMasterItems(pvPrices);
    imported = true;
  }
  if (imported) await persistLedgerMaster();
  return imported;
}

async function loadLedgerMaster() {
  if (state.demoMode) {
    if (!loadLedgerMasterFromCache()) {
      state.customers = DEMO_CUSTOMERS.map(c => ({ ...c }));
      state.prices = DEMO_PRICES.map(p => ({ ...p }));
    }
    return;
  }
  let customers = await fsLoadLedger("customers");
  let items = await fsLoadLedger("items");
  const hasMaster = (Array.isArray(customers) && customers.length) || (Array.isArray(items) && items.length);
  if (!hasMaster) {
    if (loadLedgerMasterFromCache()) return;
    await importInvoiceMasterIfEmpty();
    return;
  }
  state.customers = Array.isArray(customers) ? customers : [];
  state.prices = normalizeMasterItems(items);
  cacheLedgerMaster();
}

async function persistLedgerMaster() {
  state.customers = state.customers.map(c => ({ id: c.id || "", name: (c.name || "").trim() })).filter(c => c.name);
  state.prices = normalizeMasterItems(state.prices);
  cacheLedgerMaster();
  if (state.demoMode) return;
  await Promise.all([
    fsSaveLedger("customers", state.customers),
    fsSaveLedger("items", state.prices)
  ]);
}

async function submitMasterForm() {
  const f = state.masterForm;
  if (!f) return;
  if (f.kind === "customer" && !canMasterFullEdit()) {
    toast("客先の編集はPCから行ってください", "error");
    return;
  }
  if (f.kind === "item" && f.mode === "edit" && !canMasterFullEdit()) {
    toast("品目の編集はPCから行ってください", "error");
    return;
  }
  const name = (document.getElementById("master-form-name")?.value || "").trim();
  const code = (document.getElementById("master-form-code")?.value || "").trim();
  try {
    if (f.kind === "customer") {
      if (!name) { toast("客先名を入力してください", "error"); return; }
      if (f.mode === "add") {
        if (state.customers.some(c => c.name === name)) { toast("同じ客先があります", "error"); return; }
        state.customers.push({ id: nextCustomerId(), name });
        if (!state.masterCustomer) state.masterCustomer = name;
      } else {
        if (name !== f.oldName && state.customers.some(c => c.name === name)) { toast("同じ客先があります", "error"); return; }
        state.customers = state.customers.map(c => c.name === f.oldName ? { ...c, name } : c);
        state.prices = state.prices.map(p => p.customer === f.oldName ? { ...p, customer: name } : p);
        if (state.customer === f.oldName) {
          state.customer = name;
          loadCustomerItems(name);
        }
        if (state.masterCustomer === f.oldName) state.masterCustomer = name;
      }
    } else {
      const customer = f.customer || state.masterCustomer;
      if (!customer) { toast("客先を選択してください", "error"); return; }
      if (!name) { toast("品名を入力してください", "error"); return; }
      if (f.mode === "add") {
        state.prices.push({ customer, code, name });
      } else {
        const rows = customerItemRows(customer);
        const target = rows[f.index];
        if (!target) { toast("品目が見つかりません", "error"); return; }
        state.prices = state.prices.map(p => p === target ? { customer, code, name } : p);
        if (state.customer === customer) loadCustomerItems(customer);
      }
    }
    await persistLedgerMaster();
    state.masterForm = null;
    toast("保存しました");
    render();
  } catch (e) {
    console.error(e);
    toast("保存に失敗しました", "error");
  }
}

async function deleteMasterCustomer(name) {
  if (!canMasterFullEdit()) {
    toast("客先の削除はPCから行ってください", "error");
    return;
  }
  if (!confirm(`「${name}」を削除しますか？\nこの客先の品目もすべて削除されます。`)) return;
  try {
    state.customers = state.customers.filter(c => c.name !== name);
    state.prices = state.prices.filter(p => p.customer !== name);
    if (state.customer === name) {
      state.customer = "";
      state.items = [];
      state.focus = null;
      state.buffer = "";
    }
    if (state.masterCustomer === name) state.masterCustomer = state.customers[0]?.name || "";
    await persistLedgerMaster();
    toast("削除しました");
    render();
  } catch (e) {
    console.error(e);
    toast("削除に失敗しました", "error");
  }
}

async function deleteMasterItem(customer, index) {
  if (!canMasterFullEdit()) {
    toast("品目の削除はPCから行ってください", "error");
    return;
  }
  const rows = customerItemRows(customer);
  const target = rows[index];
  if (!target) return;
  if (!confirm(`「${target.name}」を削除しますか？`)) return;
  try {
    state.prices = state.prices.filter(p => p !== target);
    if (state.customer === customer) loadCustomerItems(customer);
    await persistLedgerMaster();
    toast("削除しました");
    render();
  } catch (e) {
    console.error(e);
    toast("削除に失敗しました", "error");
  }
}

async function loadMasters() {
  state.loading = true;
  render();
  if (state.demoMode) {
    await loadLedgerMaster();
    try {
      const cached = localStorage.getItem("lg_ledgers_demo");
      state.ledgers = applyLedgerRetention(cached ? JSON.parse(cached) : []);
    } catch { state.ledgers = []; }
    state.loading = false;
    render();
    return;
  }
  try {
    await loadLedgerMaster();
    await loadLedgersFromCloud();
  } catch (e) {
    console.error(e);
    toast("マスタの読込に失敗しました", "error");
    loadLedgerMasterFromCache();
    try {
      const cached = localStorage.getItem("lg_ledgers");
      if (cached) state.ledgers = applyLedgerRetention(JSON.parse(cached));
    } catch {}
  }
  if (!state.masterCustomer && state.customers.length) state.masterCustomer = state.customers[0].name;
  state.loading = false;
  render();
}

function loadCustomerItems(name) {
  state.customer = name;
  const rows = state.prices.filter(p => p.customer === name);
  state.items = rows.map(p => ({
    code: p.code || "",
    name: p.name || p.code || "（名称なし）",
    inQty: "",
    outQty: ""
  }));
  state.focus = null;
  state.buffer = "";
}

function selectCustomer(name) {
  if (!name) {
    state.customer = "";
    state.items = [];
    state.focus = null;
    state.buffer = "";
    render();
    return;
  }
  loadCustomerItems(name);
  maybeAutoFitForDevice();
  render();
}

function setFocus(index, field) {
  state.focus = { index, field };
  const item = state.items[index];
  state.buffer = String(field === "in" ? item.inQty : item.outQty || "");
  render();
}

function applyBuffer() {
  if (!state.focus) return;
  const { index, field } = state.focus;
  const val = state.buffer === "" ? "" : String(parseInt(state.buffer, 10) || 0);
  if (field === "in") state.items[index].inQty = val;
  else state.items[index].outQty = val;
}

function numpadPress(key) {
  if (!state.focus) {
    if (key !== "enter") toast("入または出をタップしてください", "error");
    return;
  }
  if (key === "del") {
    state.buffer = state.buffer.slice(0, -1);
  } else if (key === "enter") {
    applyBuffer();
    const { index, field } = state.focus;
    if (field === "in") {
      state.focus = { index, field: "out" };
      state.buffer = String(state.items[index].outQty || "");
    } else if (index + 1 < state.items.length) {
      state.focus = { index: index + 1, field: "in" };
      state.buffer = String(state.items[index + 1].inQty || "");
    } else {
      state.focus = null;
      state.buffer = "";
    }
  } else {
    if (state.buffer.length >= 4) return;
    state.buffer = (state.buffer === "0" ? "" : state.buffer) + key;
  }
  render();
}

function buildLedgerRecord() {
  const user = auth.currentUser;
  return {
    id: Date.now(),
    customer: state.customer,
    deliveryDate: state.deliveryDate || todayInput(),
    items: state.items.map(it => ({
      code: it.code,
      name: it.name,
      inQty: parseInt(it.inQty, 10) || 0,
      outQty: parseInt(it.outQty, 10) || 0
    })),
    createdAt: new Date().toISOString(),
    createdBy: user?.uid || "",
    createdByEmail: state.demoMode ? "試用モード" : (state.userDisplayName || state.userShortId || ""),
  };
}

function hasAnyQty(record) {
  return record.items.some(it => it.inQty > 0 || it.outQty > 0);
}

async function saveLedger() {
  if (!state.customer) { toast("客先を選択してください", "error"); return; }
  const record = buildLedgerRecord();
  if (!hasAnyQty(record)) { toast("数量を入力してください", "error"); return; }
  state.ledgers = applyLedgerRetention([record, ...state.ledgers]);
  try {
    if (state.demoMode) {
      cacheLedgers();
    } else {
      await addDoc(collection(db, "ledgerRecords"), record);
      await pruneOldLedgersFromCloud();
      cacheLedgers();
    }
    toast(state.demoMode
      ? (SKIP_LOGIN && !IS_LOCAL ? "台帳を保存しました（仮運用・この端末のみ）" : "台帳を保存しました（試用・この端末のみ）")
      : "台帳を保存しました");
    state.items = state.items.map(it => ({ ...it, inQty: "", outQty: "" }));
    state.focus = null;
    state.buffer = "";
    render();
    return record;
  } catch (e) {
    console.error(e);
    state.ledgers = state.ledgers.filter(l => l.id !== record.id);
    toast("保存に失敗しました", "error");
    return null;
  }
}

function showInvoiceMemo(record) {
  const outItems = (record.items || []).filter(it => it.outQty > 0);
  if (outItems.length === 0) {
    toast("「出」の数量がありません", "error");

function showMemoFromForm() {

    const dt = document.getElementById("delivery-date");
    if (dt) dt.onchange = e => { state.deliveryDate = e.target.value; };
    if (!state.deliveryDate) state.deliveryDate = dt?.value || todayInput();

    document.querySelectorAll(".qty-cell").forEach(el => {
      el.onclick = () => setFocus(+el.dataset.i, el.dataset.f);
    });

    const scrollEl = document.getElementById("items-scroll");
    const scrollUp = document.getElementById("scroll-up");
    const scrollDown = document.getElementById("scroll-down");
    if (scrollEl && scrollUp && scrollDown) {
      const scrollStep = () => Math.max(120, scrollEl.clientHeight * 0.55);
      scrollUp.onclick = () => scrollEl.scrollBy({ top: -scrollStep(), behavior: "smooth" });
      scrollDown.onclick = () => scrollEl.scrollBy({ top: scrollStep(), behavior: "smooth" });
    }
  }

  const saveBtn = document.getElementById("btn-save");
  const memoBtn = document.getElementById("btn-memo");
  if (saveBtn) saveBtn.onclick = saveLedger;
  if (memoBtn) memoBtn.onclick = showMemoFromForm;

  if (state.tab === 1) {
    const refreshBtn = document.getElementById("btn-refresh-history");
    if (refreshBtn) refreshBtn.onclick = async () => {
      if (state.demoMode) { render(); return; }
      try {
        await loadLedgersFromCloud();
        toast("履歴を更新しました");
      } catch { toast("更新に失敗しました", "error"); }
      render();
    };
    document.querySelectorAll(".history-row").forEach(el => {
      el.onclick = () => {
        const id = +el.dataset.id;
        state.detail = state.ledgers.find(l => l.id === id) || null;
        render();
      };
    });
  }

  if (state.tab === 2) {
    document.querySelectorAll("[data-master-section]").forEach(btn => {
      btn.onclick = () => {
        state.masterSection = btn.dataset.masterSection;
        render();
      };
    });
    const addCust = document.getElementById("master-add-customer");
    if (addCust) addCust.onclick = () => openMasterCustomerForm("add");
    document.querySelectorAll("[data-master-customer-idx]").forEach(btn => {
      btn.onclick = () => {
        const c = state.customers[+btn.dataset.masterCustomerIdx];
        if (c) openMasterCustomerForm("edit", c.name);
      };
    });
    document.querySelectorAll("[data-master-del-customer-idx]").forEach(btn => {
      btn.onclick = () => {
        const c = state.customers[+btn.dataset.masterDelCustomerIdx];
        if (c) deleteMasterCustomer(c.name);
      };
    });
    const masterSel = document.getElementById("master-cust-select");
    if (masterSel) masterSel.onchange = e => {
      state.masterCustomer = e.target.value;
      render();
    };
    const addItem = document.getElementById("master-add-item");
    if (addItem) addItem.onclick = () => openMasterItemForm("add", state.masterCustomer);
    document.querySelectorAll("[data-master-edit-item]").forEach(btn => {
      btn.onclick = () => openMasterItemForm("edit", state.masterCustomer, +btn.dataset.masterEditItem);
    });
    document.querySelectorAll("[data-master-del-item]").forEach(btn => {
      btn.onclick = () => deleteMasterItem(state.masterCustomer, +btn.dataset.masterDelItem);
    });
  }

  const masterSave = document.getElementById("master-form-save");
  const masterCancel = document.getElementById("master-form-cancel");
  const masterOverlay = document.getElementById("master-form-overlay");
  if (masterSave) masterSave.onclick = () => submitMasterForm();
  if (masterCancel) masterCancel.onclick = () => { state.masterForm = null; render(); };
  if (masterOverlay) masterOverlay.onclick = e => { if (e.target === masterOverlay) { state.masterForm = null; render(); } };
  const masterNameInput = document.getElementById("master-form-name");
  if (masterNameInput) masterNameInput.onkeydown = e => { if (e.key === "Enter") submitMasterForm(); };

  document.querySelectorAll(".nk").forEach(btn => {
    btn.onclick = () => numpadPress(btn.dataset.k);
  });

  const closeBtn = document.getElementById("detail-close");
  if (closeBtn) closeBtn.onclick = () => { state.detail = null; render(); };
  const detailMemoBtn = document.getElementById("detail-memo");
  if (detailMemoBtn) detailMemoBtn.onclick = () => showInvoiceMemo(state.detail);
  const overlay = document.getElementById("detail-overlay");
  if (overlay) overlay.onclick = e => { if (e.target === overlay) { state.detail = null; render(); } };

  const memoClose = document.getElementById("memo-close");
  if (memoClose) memoClose.onclick = () => { state.invoiceMemo = null; render(); };
  const memoOverlay = document.getElementById("memo-overlay");
  if (memoOverlay) memoOverlay.onclick = e => { if (e.target === memoOverlay) { state.invoiceMemo = null; render(); } };
  bindInstallButtons();
}

function startDemoMode() {
  state.demoMode = true;
  window.bootApp();
}

window.bootApp = async function() {
  if (!state.deliveryDate) state.deliveryDate = todayInput();
  await loadMasters();
  registerServiceWorkerLater();
};

async function startApp() {
  for (const mode of [indexedDBLocalPersistence, browserLocalPersistence, inMemoryPersistence]) {
    try {
      await setPersistence(auth, mode);
      break;
    } catch {}
  }
  onAuthStateChanged(auth, async user => {
    if (IS_LOCAL || SKIP_LOGIN) {
      startDemoMode();
      return;
    }
    if (user) {
      const saved = localStorage.getItem(SESSION_DAY_KEY);
      const today = sessionDayKey();
      if (saved && saved !== today) {
        await signOut(auth);
        clearSessionDay();
        state.userShortId = "";
        state.userDisplayName = "";
        renderLogin("日付が変わりました。朝いちどログインしてください。");
        return;
      }
      if (!state.userDisplayName && !state.userShortId) {
        await loadUserProfile(user.uid);
      }
      markSessionDay();
      state.demoMode = false;
      window.bootApp();
    } else {
      renderLogin();
    }
  }, err => {
    console.error(err);
    if (SKIP_LOGIN || IS_LOCAL) {
      startDemoMode();
      return;
    }
    renderLogin("接続エラーです。ネットワークを確認して再試行してください。");
  });
}

startApp().catch(err => {
  console.error(err);
  if (SKIP_LOGIN || IS_LOCAL) {
    startDemoMode();
    return;
  }
  renderLogin("起動に失敗しました。アプリを削除して再インストールしてください。");
});

window.addEventListener("error", e => {
  const root = document.getElementById("root");
  if (!root) return;
  root.innerHTML = `<div class="login-wrap"><div class="login-card"><h1>入出荷台帳</h1><p style="color:#c62828">起動エラーが発生しました。</p><p style="font-size:13px;margin-top:12px;line-height:1.6">① ホーム画面のアイコンを削除<br>② ブラウザでこのページを開き直す<br>③ 再インストール</p></div></div>`;
});
</script>
</body>
</html>
