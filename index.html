const db = getFirestore(app);
const auth = initializeAuth(app, { persistence: indexedDBLocalPersistence });

const SESSION_DAY_KEY = "lg_sessionDay";

function sessionDayKey() {
  return todayInput();
}

function markSessionDay() {
  try { localStorage.setItem(SESSION_DAY_KEY, sessionDayKey()); } catch {}
}

function clearSessionDay() {
  try { localStorage.removeItem(SESSION_DAY_KEY); } catch {}
}

async function endWorkDay() {
  clearSessionDay();
  state.demoMode = false;
  state.customer = "";
  state.items = [];
  state.userShortId = "";
  state.userDisplayName = "";
  await signOut(auth);
}

const state = {
  tab: 0,
  demoMode: false,
  customers: [],
  prices: [],
  ledgers: [],
  customer: "",
  deliveryDate: "",
  items: [],
  focus: null,
  buffer: "",
  detail: null,
  invoiceMemo: null,
  userShortId: "",
  userDisplayName: "",
  loading: false
};

function isActiveSession() {
  return state.demoMode || auth.currentUser;
}

function sessionLabel() {
  if (state.demoMode) return "試用モード（ログイン省略）";
  const name = state.userDisplayName || state.userShortId;
  return name ? `本日ログイン済み · ${name}` : "本日ログイン済み";
}

async function getUserProfiles() {
  const snap = await getDocs(collection(db, "userProfiles"));
  return snap.docs.map(d => ({ uid: d.id, ...d.data() }));
}

async function loadUserProfile(uid) {
  try {
    const snap = await getDoc(doc(db, "userProfiles", uid));
    if (snap.exists()) {
      const prof = snap.data();
      state.userShortId = prof.shortId || "";
      state.userDisplayName = prof.displayName || "";
    }
  } catch {}
}

function setUserProfile(prof) {
  state.userShortId = prof?.shortId || "";
  state.userDisplayName = prof?.displayName || "";
}

async function loginWithPassword(password) {
  const pass = password.trim();
  if (!pass) throw new Error("パスワードを入力してください");
  const profiles = await getUserProfiles();
  if (!profiles.length) throw new Error("ユーザー情報を取得できません。しばらく待ってから再試行してください。");
  for (const prof of profiles) {
    const email = prof.shortId
      ? prof.shortId.toLowerCase() + "@pv.local"
      : (prof.email || "");
    if (!email) continue;
    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      setUserProfile(prof);
      return cred.user;
    } catch (e) {
      if (e.code === "auth/too-many-requests") {
        throw new Error("ログイン試行が多すぎます。しばらく待ってから再試行してください。");
      }
    }
  }
  throw new Error("パスワードが正しくありません");
}

function todayInput() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso.includes("T") ? iso : iso + "T12:00:00");
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
}

function toast(msg, type = "success") {
  const el = document.createElement("div");
  el.className = "toast" + (type === "error" ? " error" : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

async function fsLoad(key) {
  const snap = await getDoc(doc(db, "pvdata", key));
  if (!snap.exists()) return null;
  try { return JSON.parse(snap.data().value); } catch { return null; }
}

async function loadLedgersFromCloud() {
  const q = query(collection(db, "ledgerRecords"), orderBy("createdAt", "desc"), limit(500));
  const snap = await getDocs(q);
  state.ledgers = snap.docs.map(d => d.data());
  try { localStorage.setItem("lg_ledgers", JSON.stringify(state.ledgers)); } catch {}
}

async function loadMasters() {
  state.loading = true;
  render();
  if (state.demoMode) {
    state.customers = DEMO_CUSTOMERS;
    state.prices = DEMO_PRICES;
    try {
      const cached = localStorage.getItem("lg_ledgers_demo");
      state.ledgers = cached ? JSON.parse(cached) : [];
    } catch { state.ledgers = []; }
    state.loading = false;
    render();
    return;
  }
  try {
    const [customers, prices] = await Promise.all([
      fsLoad("customers"),
      fsLoad("prices")
    ]);
    state.customers = Array.isArray(customers) ? customers : [];
    state.prices = Array.isArray(prices) ? prices : [];
    await loadLedgersFromCloud();
  } catch (e) {
    console.error(e);
    toast("マスタの読込に失敗しました", "error");
    try {
      const cached = localStorage.getItem("lg_ledgers");
      if (cached) state.ledgers = JSON.parse(cached);
    } catch {}
  }
  state.loading = false;
  render();
}

function loadCustomerItems(name) {
  state.customer = name;
  const rows = state.prices.filter(p => p.customer === name);
  state.items = rows.map(p => ({
    code: p.code || "",
    name: p.name || p.code || "（名称なし）",
    inQty: "",
    outQty: ""
  }));
  state.focus = null;
  state.buffer = "";
}

function selectCustomer(name) {
  if (!name) {
    state.customer = "";
    state.items = [];
    state.focus = null;
    state.buffer = "";
    render();
    return;
  }
  loadCustomerItems(name);
  render();
}

function setFocus(index, field) {
  state.focus = { index, field };
  const item = state.items[index];
  state.buffer = String(field === "in" ? item.inQty : item.outQty || "");
  render();
}

function applyBuffer() {
  if (!state.focus) return;
  const { index, field } = state.focus;
  const val = state.buffer === "" ? "" : String(parseInt(state.buffer, 10) || 0);
  if (field === "in") state.items[index].inQty = val;
  else state.items[index].outQty = val;
}

function numpadPress(key) {
  if (!state.focus) {
    if (key !== "enter") toast("入または出をタップしてください", "error");
    return;
  }
  if (key === "del") {
    state.buffer = state.buffer.slice(0, -1);
  } else if (key === "enter") {
    applyBuffer();
    const { index, field } = state.focus;
    if (field === "in") {
      state.focus = { index, field: "out" };
      state.buffer = String(state.items[index].outQty || "");
    } else if (index + 1 < state.items.length) {
      state.focus = { index: index + 1, field: "in" };
      state.buffer = String(state.items[index + 1].inQty || "");
    } else {
      state.focus = null;
      state.buffer = "";
    }
  } else {
    if (state.buffer.length >= 4) return;
    state.buffer = (state.buffer === "0" ? "" : state.buffer) + key;
  }
  render();
}

function buildLedgerRecord() {
  const user = auth.currentUser;
  return {
    id: Date.now(),
    customer: state.customer,
    deliveryDate: state.deliveryDate || todayInput(),
    items: state.items.map(it => ({
      code: it.code,
      name: it.name,
      inQty: parseInt(it.inQty, 10) || 0,
      outQty: parseInt(it.outQty, 10) || 0
    })),
    createdAt: new Date().toISOString(),
    createdBy: user?.uid || "",
    createdByEmail: state.demoMode ? "試用モード" : (state.userDisplayName || state.userShortId || ""),
  };
}

function hasAnyQty(record) {
  return record.items.some(it => it.inQty > 0 || it.outQty > 0);
}

async function saveLedger() {
  if (!state.customer) { toast("客先を選択してください", "error"); return; }
  const record = buildLedgerRecord();
  if (!hasAnyQty(record)) { toast("数量を入力してください", "error"); return; }
  state.ledgers.unshift(record);
  try {
    if (state.demoMode) {
      localStorage.setItem("lg_ledgers_demo", JSON.stringify(state.ledgers));
    } else {
      await addDoc(collection(db, "ledgerRecords"), record);
      localStorage.setItem("lg_ledgers", JSON.stringify(state.ledgers));
    }
    toast(state.demoMode ? "台帳を保存しました（試用・この端末のみ）" : "台帳を保存しました");
    state.items = state.items.map(it => ({ ...it, inQty: "", outQty: "" }));
    state.focus = null;
    state.buffer = "";
    render();
    return record;
  } catch (e) {
    console.error(e);
    state.ledgers = state.ledgers.filter(l => l.id !== record.id);
    toast("保存に失敗しました", "error");
    return null;
  }
}

function showInvoiceMemo(record) {
  const outItems = (record.items || []).filter(it => it.outQty > 0);
  if (outItems.length === 0) {
    toast("「出」の数量がありません", "error");
    return;
  }
  state.invoiceMemo = record;
  render();
}

function showMemoFromForm() {
  if (!state.customer) { toast("客先を選択してください", "error"); return; }
  const record = buildLedgerRecord();
  if (!hasAnyQty(record)) { toast("数量を入力してください", "error"); return; }
  showInvoiceMemo(record);
}

function renderInvoiceMemo(ledger) {
  const outItems = ledger.items.filter(it => it.outQty > 0);
  const rows = outItems.map(it =>
    `<tr><td>${esc(it.name)}${it.code ? `<div style="font-size:11px;color:#888">${esc(it.code)}</div>` : ""}</td><td class="qty">${it.outQty}</td></tr>`
  ).join("");
  return `
    <div class="detail-overlay" id="memo-overlay">
      <div class="detail-panel">
        <h2>伝票入力メモ</h2>
        <p style="font-size:13px;color:#666;margin-bottom:8px">${esc(ledger.customer)} · 納品日 ${fmtDate(ledger.deliveryDate)}</p>
        <div class="memo-note">伝票アプリは今までどおり別途開いて入力してください。この画面の「出」の数量を見ながら、伝票発行画面へ転記します。</div>
        <table class="memo-table"><thead><tr><th>品名</th><th style="text-align:right">出</th></tr></thead><tbody>${rows}</tbody></table>
        <div class="memo-actions">
          <button class="btn btn-ghost" id="memo-close" style="background:#f4f3ef;color:#1a1a2e">閉じる</button>
        </div>
      </div>
    </div>`;
}

function renderLogin(notice) {
  document.getElementById("root").innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <h1>入出荷台帳</h1>
        <p>パスワードを入力してください。<br>朝いちどログインすれば、その日は再入力不要です。</p>
        ${notice ? `<p style="font-size:13px;color:#c62828;margin-bottom:12px">${esc(notice)}</p>` : ""}
        <label class="lbl" style="margin-top:8px">パスワード</label>
        <input type="password" id="login-pass" placeholder="パスワード" autocomplete="current-password">
        <p id="login-error" style="font-size:13px;color:#c62828;min-height:20px;margin-top:8px;text-align:center"></p>
        <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:4px" id="login-btn">ログイン</button>
        ${IS_LOCAL ? `<button class="btn btn-ghost" style="width:100%;padding:12px;margin-top:10px" id="demo-btn">ログインなしで試す</button>` : ""}
      </div>
    </div>`;
  if (IS_LOCAL) document.getElementById("demo-btn").onclick = () => startDemoMode();
  const passInput = document.getElementById("login-pass");
  const errEl = document.getElementById("login-error");
  const doLogin = async () => {
    errEl.textContent = "";
    try {
      await loginWithPassword(passInput.value);
      markSessionDay();
    } catch (e) {
      errEl.textContent = e.message || "ログインに失敗しました";
    }
  };
  document.getElementById("login-btn").onclick = doLogin;
  passInput.onkeydown = e => { if (e.key === "Enter") doLogin(); };
}

function renderInputTab() {
  const custOpts = state.customers
    .map(c => `<option value="${esc(c.name)}"${state.customer === c.name ? " selected" : ""}>${esc(c.name)}</option>`)
    .join("");

  const rows = state.items.length === 0
    ? `<div class="empty">${state.customer ? "品目がありません" : "客先を選択してください"}</div>`
    : `<div class="list-head"><span>品名</span><span>入</span><span>出</span></div>
       <div class="item-list">${state.items.map((it, i) => {
         const inActive = state.focus?.index === i && state.focus.field === "in";
         const outActive = state.focus?.index === i && state.focus.field === "out";
         const inDisp = inActive ? (state.buffer || "0") : (it.inQty !== "" ? it.inQty : "—");
         const outDisp = outActive ? (state.buffer || "0") : (it.outQty !== "" ? it.outQty : "—");
         return `<div class="item-row${inActive || outActive ? " active" : ""}">
           <div class="item-main"><span class="item-name">${esc(it.name)}</span>${it.code ? `<span class="item-code">${esc(it.code)}</span>` : ""}</div>
           <div class="qty-cell in-col${inActive ? " active-in" : ""}${it.inQty === "" && !inActive ? " empty" : ""}" data-i="${i}" data-f="in">${esc(String(inDisp))}</div>
           <div class="qty-cell out-col${outActive ? " active-out" : ""}${it.outQty === "" && !outActive ? " empty" : ""}" data-i="${i}" data-f="out">${esc(String(outDisp))}</div>
         </div>`;
       }).join("")}</div>`;

  return `
    <div class="input-layout">
      <div class="card input-fixed">
        <div class="meta-row">
          <div><label class="lbl">客先</label>
            <select id="cust-select"><option value="">-- 選択 --</option>${custOpts}</select></div>
          <div><label class="lbl">納品日</label>
            <input type="date" id="delivery-date" value="${state.deliveryDate || todayInput()}"></div>
        </div>
        <p class="sync-note">${state.demoMode ? "試用モード：サンプル客先・品目（ログイン省略）" : "品目はプゥルヴー伝票の客先単価表から読み込み"}</p>
      </div>
      <div class="items-panel">
        <button type="button" class="scroll-btn" id="scroll-up" aria-label="上へスクロール">▲ 上へ</button>
        <div class="card items-scroll" id="items-scroll">${rows}</div>
        <button type="button" class="scroll-btn" id="scroll-down" aria-label="下へスクロール">▼ 下へ</button>
      </div>
    </div>`;
}

function renderHistoryTab() {
  if (state.ledgers.length === 0) {
    return `<div class="empty">保存された台帳はまだありません</div>`;
  }
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="btn btn-ghost" id="btn-refresh-history" style="background:#fff;border:1px solid #ddd;color:#333;padding:6px 12px;font-size:12px">↻ 更新</button>
  </div><div class="history-list">${state.ledgers.map(l => {
    const outSum = l.items.reduce((s, it) => s + (it.outQty || 0), 0);
    const inSum = l.items.reduce((s, it) => s + (it.inQty || 0), 0);
    return `<button type="button" class="history-item" data-id="${l.id}">
      <span class="history-icon">📄</span>
      <span class="history-body">
        <div class="history-title">${esc(l.customer)}</div>
        <div class="history-meta">${fmtDate(l.deliveryDate)} · 入${inSum} / 出${outSum} · ${fmtDate(l.createdAt)} ${fmtTime(l.createdAt)}</div>
      </span>
    </button>`;
  }).join("")}</div>`;
}

function renderDetail(ledger) {
  const rows = ledger.items
    .filter(it => it.inQty > 0 || it.outQty > 0)
    .map(it => `<tr><td>${esc(it.name)}</td><td class="num">${it.inQty || "—"}</td><td class="num">${it.outQty || "—"}</td></tr>`)
    .join("");
  return `
    <div class="detail-overlay" id="detail-overlay">
      <div class="detail-panel">
        <h2>${esc(ledger.customer)}</h2>
        <p style="font-size:13px;color:#666">${fmtDate(ledger.deliveryDate)} · 保存 ${fmtDate(ledger.createdAt)} ${fmtTime(ledger.createdAt)}</p>
        <table class="detail-table"><thead><tr><th>品名</th><th>入</th><th>出</th></tr></thead><tbody>${rows}</tbody></table>
        <div class="memo-actions">
          <button class="btn btn-ghost" id="detail-memo" style="background:#f0ebff;color:#5b4b8a">伝票入力メモ</button>
          <button class="btn btn-primary" id="detail-close">閉じる</button>
        </div>
      </div>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
}

function render() {
  if (!isActiveSession()) return;
  const showNumpad = state.tab === 0;
  const focusLabel = state.focus
    ? `${state.items[state.focus.index]?.name || ""} の「${state.focus.field === "in" ? "入" : "出"}」`
    : "";
  const numpadHint = focusLabel
    ? `入力中：<strong>${esc(focusLabel)}</strong>`
    : "入または出をタップしてください";

  document.getElementById("root").innerHTML = `
    <div class="app">
      <header class="header">
        <div><h1>入出荷台帳</h1><div class="header-sub">${esc(sessionLabel())}</div></div>
        <div class="header-actions">
          <button class="btn btn-ghost" id="btn-logout">${state.demoMode ? "終了" : "業務終了"}</button>
        </div>
      </header>
      <div class="tabs">
        <button class="tab${state.tab === 0 ? " active" : ""}" data-tab="0">入力</button>
        <button class="tab${state.tab === 1 ? " active" : ""}" data-tab="1">履歴 ${state.ledgers.length ? `(${state.ledgers.length})` : ""}</button>
      </div>
      <div class="workspace">
        <main class="main">
          ${state.loading ? `<div class="empty">読込中…</div>` : state.tab === 0 ? renderInputTab() : `<div class="main-scroll">${renderHistoryTab()}</div>`}
        </main>
        <aside class="numpad-wrap${showNumpad ? "" : " hidden"}${state.focus ? "" : " disabled"}" aria-label="テンキー">
          <div class="sidebar-actions">
            <button class="btn btn-primary" id="btn-save">完了して保存</button>
            <button class="btn btn-memo" id="btn-memo">伝票入力メモ</button>
          </div>
          <div class="numpad-target">${numpadHint}</div>
          <div class="numpad">
            ${["7","8","9","4","5","6","1","2","3"].map(n => `<button type="button" class="nk" data-k="${n}">${n}</button>`).join("")}
            <button type="button" class="nk del" data-k="del">DEL</button>
            <button type="button" class="nk" data-k="0">0</button>
            <button type="button" class="nk enter" data-k="enter">ENTER</button>
          </div>
        </aside>
      </div>
    </div>
    ${state.detail ? renderDetail(state.detail) : ""}
    ${state.invoiceMemo ? renderInvoiceMemo(state.invoiceMemo) : ""}`;

  document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = async () => {
      state.tab = +btn.dataset.tab;
      state.focus = null;
      if (state.tab === 1 && !state.demoMode && !state.loading) {
        try { await loadLedgersFromCloud(); } catch {}
      }
      render();
    };
  });
  document.getElementById("btn-logout").onclick = async () => {
    if (state.demoMode) {
      state.demoMode = false;
      state.customer = "";
      state.items = [];
      renderLogin();
    } else {
      await endWorkDay();
    }
  };

  if (state.tab === 0 && !state.loading) {
    const sel = document.getElementById("cust-select");
    if (sel) sel.onchange = e => selectCustomer(e.target.value);
    const dt = document.getElementById("delivery-date");
    if (dt) dt.onchange = e => { state.deliveryDate = e.target.value; };
    if (!state.deliveryDate) state.deliveryDate = dt?.value || todayInput();

    document.querySelectorAll(".qty-cell").forEach(el => {
      el.onclick = () => setFocus(+el.dataset.i, el.dataset.f);
    });

    const scrollEl = document.getElementById("items-scroll");
    const scrollUp = document.getElementById("scroll-up");
    const scrollDown = document.getElementById("scroll-down");
    if (scrollEl && scrollUp && scrollDown) {
      const scrollStep = () => Math.max(120, scrollEl.clientHeight * 0.55);
      scrollUp.onclick = () => scrollEl.scrollBy({ top: -scrollStep(), behavior: "smooth" });
      scrollDown.onclick = () => scrollEl.scrollBy({ top: scrollStep(), behavior: "smooth" });
    }
  }

  const saveBtn = document.getElementById("btn-save");
  const memoBtn = document.getElementById("btn-memo");
  if (saveBtn) saveBtn.onclick = saveLedger;
  if (memoBtn) memoBtn.onclick = showMemoFromForm;

  if (state.tab === 1) {
    const refreshBtn = document.getElementById("btn-refresh-history");
    if (refreshBtn) refreshBtn.onclick = async () => {
      if (state.demoMode) { render(); return; }
      try {
        await loadLedgersFromCloud();
        toast("履歴を更新しました");
      } catch { toast("更新に失敗しました", "error"); }
      render();
    };
    document.querySelectorAll(".history-item").forEach(el => {
      el.onclick = () => {
        const id = +el.dataset.id;
        state.detail = state.ledgers.find(l => l.id === id) || null;
        render();
      };
    });
  }

  document.querySelectorAll(".nk").forEach(btn => {
    btn.onclick = () => numpadPress(btn.dataset.k);
  });

  const closeBtn = document.getElementById("detail-close");
  if (closeBtn) closeBtn.onclick = () => { state.detail = null; render(); };
  const detailMemoBtn = document.getElementById("detail-memo");
  if (detailMemoBtn) detailMemoBtn.onclick = () => showInvoiceMemo(state.detail);
  const overlay = document.getElementById("detail-overlay");
  if (overlay) overlay.onclick = e => { if (e.target === overlay) { state.detail = null; render(); } };

  const memoClose = document.getElementById("memo-close");
  if (memoClose) memoClose.onclick = () => { state.invoiceMemo = null; render(); };
  const memoOverlay = document.getElementById("memo-overlay");
  if (memoOverlay) memoOverlay.onclick = e => { if (e.target === memoOverlay) { state.invoiceMemo = null; render(); } };
}

function startDemoMode() {
  state.demoMode = true;
  window.bootApp();
}

window.bootApp = async function() {
  if (!state.deliveryDate) state.deliveryDate = todayInput();
  await loadMasters();
};

onAuthStateChanged(auth, async user => {
  if (user) {
    const saved = localStorage.getItem(SESSION_DAY_KEY);
    const today = sessionDayKey();
    if (saved && saved !== today) {
      await signOut(auth);
      clearSessionDay();
      state.userShortId = "";
      state.userDisplayName = "";
      renderLogin("日付が変わりました。朝いちどログインしてください。");
      return;
    }
    if (!state.userDisplayName && !state.userShortId) {
      await loadUserProfile(user.uid);
    }
    markSessionDay();
    state.demoMode = false;
    window.bootApp();
  } else if (IS_LOCAL) {
    startDemoMode();
  } else {
    renderLogin();
  }
});
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
